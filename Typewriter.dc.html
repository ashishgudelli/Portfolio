<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&amp;family=Courier+Prime:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: #2e2a26; }
  a { color: #8a6d4f; } a:hover { color: #b08d63; }
  @keyframes cursorBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  textarea:focus { outline: none; }
  ::selection { background: rgba(138,109,79,0.35); }
</style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; background: radial-gradient(ellipse at 50% 30%, #3a352f 0%, #2e2a26 60%, #262320 100%); font-family: 'Courier Prime', monospace; padding: 0 12px; box-sizing: border-box;">

  <!-- Top bar -->
  <div style="width: 100%; max-width: 760px; display: flex; align-items: center; justify-content: space-between; padding: 18px 4px 14px; box-sizing: border-box; flex-wrap: wrap; gap: 10px;">
    <div style="display: flex; align-items: baseline; gap: 10px;">
      <span style="font-family: 'Special Elite', monospace; font-size: 20px; color: #d8cbb8; letter-spacing: 1px;">typewriter</span>
      <span style="font-size: 12px; color: #7a6f60;">{{ wordCount }} words</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
      <!-- Paper style picker -->
      <div style="display: flex; gap: 4px; background: rgba(0,0,0,0.25); border-radius: 6px; padding: 3px;">
        <sc-for list="{{ paperOptions }}" as="opt" hint-placeholder-count="3">
          <button onClick="{{ opt.pick }}" style="border: none; cursor: pointer; font-family: 'Courier Prime', monospace; font-size: 12px; padding: 5px 10px; border-radius: 4px; background: {{ opt.bg }}; color: {{ opt.fg }}; transition: background 0.15s;">{{ opt.label }}</button>
        </sc-for>
      </div>
      <button onClick="{{ toggleFocus }}" title="Focus mode: dim everything but the current line" style="border: 1px solid #4d453c; cursor: pointer; font-family: 'Courier Prime', monospace; font-size: 12px; padding: 5px 12px; border-radius: 6px; background: {{ focusBg }}; color: {{ focusFg }}; transition: background 0.15s;">focus</button>
      <button onClick="{{ toggleSound }}" title="Toggle typewriter sounds" style="border: 1px solid #4d453c; cursor: pointer; font-family: 'Courier Prime', monospace; font-size: 12px; padding: 5px 12px; border-radius: 6px; background: {{ soundBg }}; color: {{ soundFg }}; transition: background 0.15s;">{{ soundLabel }}</button>
      <button onClick="{{ exportPng }}" style="border: none; cursor: pointer; font-family: 'Courier Prime', monospace; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 6px; background: #8a6d4f; color: #f5ead9; transition: background 0.15s;" style-hover="background: #9c7d5c;">{{ exportLabel }}</button>
    </div>
  </div>

  <!-- Paper -->
  <div style="width: 100%; max-width: 720px; flex: 1; display: flex; flex-direction: column; padding-bottom: 60px; box-sizing: border-box;">
    <div ref="{{ paperRef }}" onClick="{{ focusPaper }}" style="position: relative; background: {{ paperBg }}; background-image: {{ paperTexture }}; border-radius: 2px 2px 0 0; box-shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 30px rgba(0,0,0,0.45); min-height: 70vh; padding: 64px 56px 80px; box-sizing: border-box; cursor: text; transition: background 0.3s;">
      <!-- hidden capture element -->
      <div style="position: absolute; top: 12px; right: 16px; font-family: 'Special Elite', monospace; font-size: 11px; color: rgba(60,50,40,0.35); user-select: none;">{{ dateLine }}</div>
      <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ true }}">
        <div style="position: absolute; top: 64px; left: 56px; right: 56px; font-family: 'Special Elite', monospace; font-size: {{ fontSizePx }}; color: rgba(60,50,40,0.3); pointer-events: none; line-height: {{ lineHeightPx }};">Start typing…</div>
      </sc-if>
      <div style="position: relative;">
        <div ref="{{ mirrorRef }}" style="font-family: 'Special Elite', monospace; font-size: {{ fontSizePx }}; line-height: {{ lineHeightPx }}; color: transparent; white-space: pre-wrap; word-break: break-word; min-height: 1.6em; pointer-events: none;"></div>
        <textarea ref="{{ taRef }}" onInput="{{ onInput }}" onKeyDown="{{ onKeyDown }}" onScroll="{{ onScroll }}" spellcheck="false" autocapitalize="sentences" style="position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: transparent; resize: none; font-family: 'Special Elite', monospace; font-size: {{ fontSizePx }}; line-height: {{ lineHeightPx }}; color: {{ inkColor }}; caret-color: #6b5138; white-space: pre-wrap; word-break: break-word; padding: 0; margin: 0; overflow: hidden; box-sizing: border-box;"></textarea>
      </div>
      <!-- focus mode overlays -->
      <sc-if value="{{ focusOn }}" hint-placeholder-val="{{ false }}">
        <div style="position: absolute; left: 0; right: 0; top: 0; height: {{ dimTopH }}; background: {{ dimColor }}; pointer-events: none; transition: height 0.12s ease-out;"></div>
        <div style="position: absolute; left: 0; right: 0; top: {{ dimBotTop }}; bottom: 0; background: {{ dimColor }}; pointer-events: none; transition: top 0.12s ease-out;"></div>
      </sc-if>
    </div>
  </div>

  <div style="width: 100%; max-width: 720px; text-align: center; padding-bottom: 20px; font-size: 11px; color: #5d554a;">everything stays on this page — nothing is saved or sent anywhere</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;strictMode&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Behavior&quot;}, &quot;fontSize&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 17, &quot;min&quot;: 14, &quot;max&quot;: 24, &quot;step&quot;: 1, &quot;unit&quot;: &quot;px&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Type&quot;}}">
class Component extends DCLogic {
  state = {
    text: '',
    paper: 'clean',
    focusOn: false,
    soundOn: true,
    caretLineTop: 0,
    exporting: false,
  };

  constructor(props) {
    super(props);
    this.taRef = React.createRef();
    this.mirrorRef = React.createRef();
    this.paperRef = React.createRef();
    this.audioCtx = null;
    this.lastLineCount = 1;
  }

  componentDidMount() {
    setTimeout(() => { if (this.taRef.current) { this.syncHeight(); this.taRef.current.focus(); } }, 100);
    this._resize = () => this.syncHeight();
    window.addEventListener('resize', this._resize);
  }
  componentWillUnmount() { window.removeEventListener('resize', this._resize); }

  // ---------- sound ----------
  ctx() {
    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    return this.audioCtx;
  }
  playClack() {
    if (!this.state.soundOn) return;
    try {
      const ctx = this.ctx(), t = ctx.currentTime;
      // noise burst
      const len = 0.03 * ctx.sampleRate;
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = 2200 + Math.random() * 1200; bp.Q.value = 1.2;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.5 + Math.random() * 0.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      src.connect(bp); bp.connect(g); g.connect(ctx.destination);
      src.start(t);
      // low thunk
      const o = ctx.createOscillator(); o.type = 'triangle';
      o.frequency.setValueAtTime(160 + Math.random() * 40, t);
      const g2 = ctx.createGain();
      g2.gain.setValueAtTime(0.12, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
      o.connect(g2); g2.connect(ctx.destination);
      o.start(t); o.stop(t + 0.05);
    } catch (e) {}
  }
  playDing() {
    if (!this.state.soundOn) return;
    try {
      const ctx = this.ctx(), t = ctx.currentTime;
      const o = ctx.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(1760, t);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.0005, t + 0.9);
      const o2 = ctx.createOscillator(); o2.type = 'sine';
      o2.frequency.setValueAtTime(2637, t);
      const g2 = ctx.createGain();
      g2.gain.setValueAtTime(0.08, t);
      g2.gain.exponentialRampToValueAtTime(0.0005, t + 0.6);
      o.connect(g); g.connect(ctx.destination);
      o2.connect(g2); g2.connect(ctx.destination);
      o.start(t); o.stop(t + 1); o2.start(t); o2.stop(t + 0.7);
    } catch (e) {}
  }

  // ---------- layout ----------
  syncHeight() {
    const ta = this.taRef.current, m = this.mirrorRef.current;
    if (!ta || !m) return;
    m.textContent = ta.value + '\u200b';
    this.updateCaretLine();
  }
  updateCaretLine() {
    const ta = this.taRef.current, m = this.mirrorRef.current;
    if (!ta || !m || !this.state.focusOn) return;
    // measure caret Y by mirroring text up to caret
    const pos = ta.selectionStart;
    const meas = document.createElement('div');
    const cs = getComputedStyle(ta);
    meas.style.cssText = 'position:absolute;visibility:hidden;white-space:pre-wrap;word-break:break-word;';
    meas.style.width = ta.clientWidth + 'px';
    meas.style.fontFamily = cs.fontFamily; meas.style.fontSize = cs.fontSize; meas.style.lineHeight = cs.lineHeight;
    meas.textContent = ta.value.substring(0, pos);
    const span = document.createElement('span'); span.textContent = '\u200b';
    meas.appendChild(span);
    m.parentElement.appendChild(meas);
    const top = span.offsetTop;
    meas.remove();
    if (top !== this.state.caretLineTop) this.setState({ caretLineTop: top });
  }

  // ---------- handlers ----------
  onInput = (e) => {
    const val = e.target.value;
    const lines = val.split('\n').length;
    this.setState({ text: val }, () => { this.syncHeight(); });
    this.lastLineCount = lines;
  };
  onKeyDown = (e) => {
    const strict = this.props.strictMode ?? false;
    if (strict && (e.key === 'Backspace' || e.key === 'Delete' || e.key.startsWith('Arrow'))) {
      e.preventDefault();
      return;
    }
    if (e.key.length === 1) this.playClack();
    else if (e.key === 'Enter') this.playDing();
    else if (e.key === 'Backspace') this.playClack();
    setTimeout(() => this.updateCaretLine(), 0);
  };
  onScroll = () => {};

  focusPaper = () => { if (this.taRef.current) this.taRef.current.focus(); };

  exportPng = async () => {
    const node = this.paperRef.current;
    if (!node || this.state.exporting || !window.htmlToImage) return;
    this.setState({ exporting: true });
    try {
      const dataUrl = await window.htmlToImage.toPng(node, { pixelRatio: 2, backgroundColor: null });
      const a = document.createElement('a');
      a.download = 'typewriter-page.png';
      a.href = dataUrl;
      a.click();
    } catch (err) { console.error('export failed', err); }
    this.setState({ exporting: false });
  };

  renderVals() {
    const { text, paper, focusOn, soundOn, exporting, caretLineTop } = this.state;
    const fontSize = this.props.fontSize ?? 17;
    const lineH = Math.round(fontSize * 30 / 17);

    const papers = {
      clean: { bg: '#f4eee2', texture: 'none', ink: '#2b2117' },
      aged:  { bg: '#e8dcc0', texture: 'radial-gradient(ellipse at 20% 10%, rgba(160,120,60,0.10) 0%, transparent 50%), radial-gradient(ellipse at 85% 80%, rgba(140,100,50,0.12) 0%, transparent 45%), radial-gradient(ellipse at 60% 40%, rgba(120,90,50,0.05) 0%, transparent 60%)', ink: '#3a2c1c' },
      lined: { bg: '#f6f2e8', texture: 'repeating-linear-gradient(transparent, transparent ' + (lineH - 1) + 'px, rgba(100,130,160,0.25) ' + (lineH - 1) + 'px, rgba(100,130,160,0.25) ' + lineH + 'px)', ink: '#26303a' },
    };
    const p = papers[paper];

    const paperOptions = ['clean', 'aged', 'lined'].map((key) => ({
      label: key,
      bg: key === paper ? '#8a6d4f' : 'transparent',
      fg: key === paper ? '#f5ead9' : '#a89a85',
      pick: () => this.setState({ paper: key }, () => this.syncHeight()),
    }));

    const words = text.trim() ? text.trim().split(/\s+/).length : 0;

    const dimAlpha = 'rgba(0,0,0,0)';
    // dim overlays sit over the paper; use paper-tinted veil
    const dimColor = paper === 'lined' ? 'rgba(246,242,232,0.82)' : (paper === 'aged' ? 'rgba(232,220,192,0.82)' : 'rgba(244,238,226,0.82)');
    const contentTop = 64; // paper padding top

    const now = new Date();
    const dateLine = now.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });

    return {
      taRef: this.taRef, mirrorRef: this.mirrorRef, paperRef: this.paperRef,
      onInput: this.onInput, onKeyDown: this.onKeyDown, onScroll: this.onScroll,
      focusPaper: this.focusPaper, exportPng: this.exportPng,
      toggleFocus: () => this.setState({ focusOn: !focusOn }, () => this.updateCaretLine()),
      toggleSound: () => this.setState({ soundOn: !soundOn }),
      paperOptions,
      paperBg: p.bg, paperTexture: p.texture, inkColor: p.ink,
      lineHeightPx: lineH + 'px',
      fontSizePx: fontSize + 'px',
      wordCount: String(words),
      isEmpty: text.length === 0,
      focusOn,
      focusBg: focusOn ? '#8a6d4f' : 'transparent',
      focusFg: focusOn ? '#f5ead9' : '#a89a85',
      soundBg: 'transparent',
      soundFg: soundOn ? '#d8cbb8' : '#6b6155',
      soundLabel: soundOn ? 'sound on' : 'sound off',
      exportLabel: exporting ? 'saving…' : 'save PNG',
      dimColor,
      dimTopH: (contentTop + caretLineTop - 4) + 'px',
      dimBotTop: (contentTop + caretLineTop + lineH + 4) + 'px',
      dateLine,
    };
  }
}
</script>
</body>
</html>
